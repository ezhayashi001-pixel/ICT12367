{% extends 'base.html' %}

{% block title %}<title>แบบฟอร์ม | Pattarapon Polboon</title>{% endblock %}

{% block content %}
<!-- Hero Banner -->
<div class="p-4 mb-4 bg-dark text-white rounded-3 text-center">
    <h2 class="fw-bold">🐧 ยินดีต้อนรับสู่เว็บไซต์ของรายวิชา ICT12367</h2>
</div>

<!-- Form Card -->
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center fs-5 fw-bold">
                แบบฟอร์มบันทึกข้อมูลประชากร
            </div>
            <div class="card-body">
                <form method="post" action="/form/">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">ชื่อประชากร</label>
                        <input type="text" name="name" class="form-control" placeholder="กรุณากรอกชื่อ-นามสกุล">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">อายุ</label>
                        <input type="number" name="age" class="form-control" placeholder="กรอกข้อมูลอายุเป็นตัวเลข">
                    </div>
                    <div class="d-flex gap-2 justify-content-center">
                        <button type="submit" class="btn btn-success px-4">ลงทะเบียน</button>
                        <button type="reset" class="btn btn-danger px-4">ล้างข้อมูล</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
