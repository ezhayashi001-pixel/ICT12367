{% extends "base.html" %}

{% block title %}
    <title>หน้าแรกของเว็บไซต์</title>
{% endblock %}

{% block content %}
<h2 style="color: blueviolet;">ยินดีต้อนรับเข้าสู่ประชากร</h2>
<table class="table table-hover">
    <thead>
        <tr>
            <th scope="col">รหัสประชากร</th>
            <th scope="col">ชื่อประชากร</th>
            <th scope="col">อายุ</th>
            <th scope="col" class="text-center">แก้ไข</th>
            <th scope="col" class="text-center">ลบ</th>
        </tr>
    </thead>
    <tbody>
        {% for person in all_person %}
        <tr>
            <th scope="row">{{ person.id }}</th>
            <td>{{ person.name }}</td>
            <td>{{ person.age }}</td>
            <td class="text-center">
                <a href="#" class="btn btn-danger" 
                   style="background-color: #e91e8c; border-color: #e91e8c; color: white;">แก้ไข</a>
            </td>
            <td class="text-center">
                <a href="#" class="btn btn-warning" 
                   style="background-color: #ff6600; border-color: #ff6600; color: white;">ลบ</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
